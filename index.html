<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohidul Islam Ashik Creation Tv | Ultra Premium Player</title>
    <meta name="description" content="Watch Ohidul Islam Ashik Creation Tv online. The ultimate ultra-premium M3U player for high-quality live streaming. Access your favorite channels easily with a professional interface created by Ohidul Islam Ashik.">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0000; 
            --bg-body: #000000;
            --bg-sidebar: #0a0a0a;
            --bg-card: #151515;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #222222;
        }

        [data-theme="light"] {
            --bg-body: #ffffff;
            --bg-sidebar: #f0f0f0;
            --bg-card: #ffffff;
            --text-main: #121212;
            --text-muted: #555555;
            --border-color: #dddddd;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { background: var(--bg-sidebar); padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .brand-logo { display: flex; align-items: center; gap: 12px; }
        .logo-box { background: linear-gradient(135deg, #ff0000, #8b0000); color: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 900; }
        .logo-main { font-size: 20px; font-weight: 800; background: linear-gradient(to right, var(--primary), #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        main { display: flex; flex: 1; overflow: hidden; }
        .video-container { flex: 3; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; }

        .sidebar { flex: 1; max-width: 380px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-left: 1px solid var(--border-color); }
        .upload-area { padding: 15px; }
        .btn-upload { display: block; background: var(--primary); color: white; text-align: center; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }

        .playlist { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-item { display: flex; align-items: center; padding: 10px; background: var(--bg-card); border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border-color); }
        .channel-logo { width: 45px; height: 45px; object-fit: contain; background: white; border-radius: 5px; margin-right: 12px; }
        .channel-name { font-weight: 600; font-size: 14px; }

        @media (max-width: 1024px) { main { flex-direction: column; } .sidebar { max-width: 100%; } video { height: 250px; } }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">
            <div class="logo-box">O</div>
            <div>
                <span class="logo-main">OHIDUL ISLAM ASHIK</span><br>
                <small style="color:var(--text-muted)">Creation Tv</small>
            </div>
        </div>
        <button id="theme-toggle" style="background:none; border:none; color:var(--text-main); cursor:pointer;"><i class="fas fa-moon"></i></button>
    </header>

    <main>
        <div class="video-container">
            <video id="tv-player" controls poster="https://via.placeholder.com/1280x720/000/fff?text=ASHIK+CREATION+TV"></video>
        </div>

        <div class="sidebar">
            <div class="upload-area">
                <label class="btn-upload">
                    <input type="file" id="m3u-file" accept=".m3u,.m3u8" style="display:none;">
                    IMPORT M3U PLAYLIST
                </label>
                <p id="status" style="font-size: 10px; color: var(--primary); margin-top: 5px; text-align: center;"></p>
            </div>
            <div class="playlist" id="channel-list"></div>
        </div>
    </main>

    <script>
        const video = document.getElementById('tv-player');
        const listContainer = document.getElementById('channel-list');
        const fileInput = document.getElementById('m3u-file');
        const statusText = document.getElementById('status');
        
        let hls = new Hls();
        let database = [];

        // CORS Proxy List
        const proxies = [
            "", // Direct link
            "https://cors-anywhere.herokuapp.com/",
            "https://api.allorigins.win/raw?url="
        ];

        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                const lines = reader.result.split('\n');
                database = [];
                let entry = {};
                lines.forEach(line => {
                    if(line.startsWith('#EXTINF:')) {
                        entry.name = line.split(',')[1] || "Unknown";
                        entry.logo = line.match(/tvg-logo="([^"]+)"/)?.[1] || "";
                    } else if(line.startsWith('http')) {
                        entry.url = line.trim();
                        database.push(entry);
                        entry = {};
                    }
                });
                render(database);
            };
            reader.readAsText(e.target.files[0]);
        };

        function render(data) {
            listContainer.innerHTML = '';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `
                    <img class="channel-logo" src="${item.logo}" onerror="this.src='https://via.placeholder.com/100?text=TV'">
                    <span class="channel-name">${item.name}</span>
                `;
                div.onclick = () => playWithProxy(item.url);
                listContainer.appendChild(div);
            });
        }

        async function playWithProxy(url) {
            statusText.innerText = "Trying to bypass blocks...";
            let success = false;

            // পর্যায়ক্রমে প্রক্সি দিয়ে চেষ্টা করবে
            for (let proxy of proxies) {
                try {
                    const finalUrl = proxy + url;
                    if (await checkLink(finalUrl)) {
                        startStream(finalUrl);
                        success = true;
                        statusText.innerText = "Playing via " + (proxy ? "Proxy" : "Direct");
                        break;
                    }
                } catch (e) {}
            }

            if (!success) {
                statusText.innerText = "Channel Offline or Hard Blocked.";
            }
        }

        function checkLink(url) {
            return new Promise((resolve) => {
                const testVideo = document.createElement('video');
                testVideo.src = url;
                testVideo.oncanplay = () => resolve(true);
                testVideo.onerror = () => resolve(false);
                setTimeout(() => resolve(false), 5000); // 5 sec timeout
            });
        }

        function startStream(url) {
            if(Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = url;
                video.play();
            }
        }
    </script>
</body>
</html>
