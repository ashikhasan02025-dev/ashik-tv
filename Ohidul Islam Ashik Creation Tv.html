<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohidul Islam Ashik Creation Tv | Ultra Professional Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Dark Mode (Default) - Absolute Black */
            --primary: #FF0000;
            --accent: #FF3D00;
            --bg-body: #000000;
            --bg-sidebar: #080808;
            --bg-card: #121212;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --border: #1E1E1E;
            --shadow: 0 10px 30px rgba(0,0,0,0.7);
            --card-hover: #1A1A1A;
            --drive-color: #34A853; /* Google Drive Green */
        }

        [data-theme="light"] {
            /* Light Mode - Pure White */
            --bg-body: #FFFFFF;
            --bg-sidebar: #F5F5F7;
            --bg-card: #FFFFFF;
            --text-main: #1D1D1F;
            --text-muted: #6E6E73;
            --border: #E5E5E7;
            --shadow: 0 5px 15px rgba(0,0,0,0.05);
            --card-hover: #F0F0F2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            height: 70px;
            background: var(--bg-sidebar);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 15px; }
        .logo-box {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px; font-weight: 900;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
        }

        .brand-text h1 {
            font-size: 18px; font-weight: 800;
            background: linear-gradient(to right, #FF0000, #FF7F7F);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .header-actions { display: flex; align-items: center; gap: 20px; }
        .search-wrapper { position: relative; width: 250px; }
        .search-wrapper input {
            width: 100%; padding: 8px 15px 8px 35px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text-main); outline: none;
        }
        .search-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--primary); }

        .theme-toggle {
            cursor: pointer; width: 35px; height: 35px; border-radius: 50%;
            background: var(--bg-card); display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border); color: var(--primary);
        }

        /* --- Main Layout --- */
        main { display: flex; flex: 1; overflow: hidden; }

        .player-section { flex: 3; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; }

        /* --- Sidebar --- */
        .sidebar {
            flex: 1; max-width: 400px; background: var(--bg-sidebar);
            border-left: 1px solid var(--border); display: flex; flex-direction: column;
        }

        /* Google Drive Section */
        .drive-section {
            padding: 15px 20px;
            background: rgba(52, 168, 83, 0.1);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }
        .drive-btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 15px; background: var(--drive-color);
            color: white; text-decoration: none; border-radius: 8px;
            font-weight: 700; font-size: 13px; width: 100%; justify-content: center;
        }
        .drive-btn:hover { background: #2d9249; transform: translateY(-2px); }

        .upload-section { padding: 15px 20px; border-bottom: 1px solid var(--border); }
        .upload-btn {
            width: 100%; padding: 10px; background: linear-gradient(to right, var(--primary), var(--accent));
            border: none; border-radius: 8px; color: white; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            text-transform: uppercase; font-size: 12px;
        }

        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab {
            flex: 1; padding: 12px; text-align: center; font-weight: 700;
            font-size: 12px; cursor: pointer; color: var(--text-muted); border-bottom: 3px solid transparent;
        }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: rgba(255, 0, 0, 0.05); }

        .channel-list { flex: 1; overflow-y: auto; padding: 15px; }

        /* --- Channel Card --- */
        .channel-card {
            display: flex; align-items: center; padding: 10px;
            background: var(--bg-card); border-radius: 10px; margin-bottom: 10px;
            border: 1px solid var(--border); cursor: pointer;
        }
        .channel-card:hover { transform: translateX(5px); border-color: var(--primary); background: var(--card-hover); }
        .channel-logo { width: 50px; height: 35px; object-fit: contain; background: #fff; border-radius: 4px; margin-right: 12px; }
        .channel-name { font-size: 13px; font-weight: 600; flex: 1; }
        .fav-icon { font-size: 16px; color: #333; }
        .fav-icon.active { color: var(--primary); }

        /* Mobile */
        @media (max-width: 1024px) {
            main { flex-direction: column; overflow-y: auto; }
            .sidebar { max-width: 100%; height: auto; border-left: none; }
            .player-section { height: 250px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="logo-box">O</div>
            <div class="brand-text">
                <h1>OHIDUL ISLAM ASHIK</h1>
                <span style="font-size: 10px; color: var(--text-muted); letter-spacing: 1px;">Creation Tv</span>
            </div>
        </div>

        <div class="header-actions">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="search" placeholder="Search...">
            </div>
            <div class="theme-toggle" id="theme-btn">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </header>

    <main>
        <section class="player-section">
            <video id="main-player" controls poster="https://via.placeholder.com/1920x1080/000/fff?text=OHIDUL+ISLAM+ASHIK+TV"></video>
        </section>

        <aside class="sidebar">
            <div class="drive-section">
                <p style="font-size: 11px; margin-bottom: 8px; color: var(--text-muted);">Get Official Playlist from Drive:</p>
                <a href="https://drive.google.com/file/d/1ODUR13a6CZhwyfsmdKJJjS64SljsV5I6/view?usp=sharing" target="_blank" class="drive-btn">
                    <i class="fab fa-google-drive"></i> Download M3U File
                </a>
            </div>

            <div class="upload-section">
                <label class="upload-btn">
                    <input type="file" id="m3u-input" accept=".m3u,.m3u8" style="display:none;">
                    <i class="fas fa-file-import"></i> Import Downloaded Playlist
                </label>
            </div>

            <div class="tabs">
                <div class="tab active" id="tab-all">CHANNELS</div>
                <div class="tab" id="tab-fav">FAVORITES</div>
            </div>
            <div class="channel-list" id="list-container">
                <p style="text-align:center; padding:20px; color:var(--text-muted); font-size:12px;">Download the file above and import it to start watching.</p>
            </div>
        </aside>
    </main>

    <script>
        const video = document.getElementById('main-player');
        const listContainer = document.getElementById('list-container');
        const fileInput = document.getElementById('m3u-input');
        const searchInput = document.getElementById('search');
        const themeBtn = document.getElementById('theme-btn');
        
        let hls = new Hls();
        let playlistData = [];
        let favorites = JSON.parse(localStorage.getItem('ashik_favs_pro')) || [];
        let currentTab = 'all';

        // Theme Toggle
        themeBtn.onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('ashik_theme_pro', isDark ? 'light' : 'dark');
        };
        if(localStorage.getItem('ashik_theme_pro') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
        }

        // Tab Switching
        document.getElementById('tab-all').onclick = function() {
            currentTab = 'all'; this.classList.add('active');
            document.getElementById('tab-fav').classList.remove('active');
            render(playlistData);
        };
        document.getElementById('tab-fav').onclick = function() {
            currentTab = 'fav'; this.classList.add('active');
            document.getElementById('tab-all').classList.remove('active');
            render(favorites);
        };

        // File Import
        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                const lines = reader.result.split('\n');
                playlistData = [];
                let item = {};
                lines.forEach(line => {
                    line = line.trim();
                    if(line.startsWith('#EXTINF:')) {
                        item.name = line.split(',')[1] || "Channel";
                        item.logo = line.match(/tvg-logo="([^"]+)"/)?.[1] || "https://via.placeholder.com/100?text=TV";
                        item.id = btoa(item.name + item.logo);
                    } else if(line.startsWith('http')) {
                        item.url = line;
                        playlistData.push(item);
                        item = {};
                    }
                });
                render(playlistData);
            };
            reader.readAsText(e.target.files[0]);
        };

        function render(data) {
            listContainer.innerHTML = '';
            if(data.length === 0) {
                listContainer.innerHTML = `<p style="text-align:center; padding:20px; color:var(--text-muted); font-size:12px;">No channels found.</p>`;
                return;
            }
            data.forEach(item => {
                const isFav = favorites.some(f => f.id === item.id);
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <img class="channel-logo" src="${item.logo}" onerror="this.src='https://via.placeholder.com/100?text=TV'">
                    <p class="channel-name">${item.name}</p>
                    <i class="fas fa-heart fav-icon ${isFav ? 'active' : ''}" onclick="toggleFav(event, '${item.id}')"></i>
                `;
                card.onclick = () => {
                    if(Hls.isSupported()) {
                        hls.destroy(); hls = new Hls();
                        hls.loadSource(item.url); hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                    } else { video.src = item.url; video.play(); }
                };
                listContainer.appendChild(card);
            });
        }

        window.toggleFav = (e, id) => {
            e.stopPropagation();
            const source = [...playlistData, ...favorites];
            const item = source.find(i => i.id === id);
            const idx = favorites.findIndex(f => f.id === id);
            if(idx > -1) favorites.splice(idx, 1);
            else favorites.push(item);
            localStorage.setItem('ashik_favs_pro', JSON.stringify(favorites));
            render(currentTab === 'all' ? playlistData : favorites);
        };

        searchInput.onkeyup = () => {
            const query = searchInput.value.toLowerCase();
            const source = currentTab === 'all' ? playlistData : favorites;
            render(source.filter(i => i.name.toLowerCase().includes(query)));
        };
    </script>
</body>
</html>
